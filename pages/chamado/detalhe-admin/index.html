<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chamado — ServiceDesk Facul</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../../assets/css/base.css">
    <link rel="stylesheet" href="../../../assets/css/lista.css">
    <style>
        .chat-bubble { border-radius: 12px; max-width: 80%; }
        .chat-admin  { background: #e9ecef; }
        .chat-cliente { background: #d1e7ff; }
        .rotulo-secao { font-size: .78rem; letter-spacing: .06em; }
    </style>
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark mb-4 shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/pages/dashboard/index.html">
            <i class="bi bi-headset me-2 text-primary"></i>ServiceDesk Facul
        </a>
        <div class="text-white d-flex align-items-center">
            <span class="me-2 small text-white-50">Logado como:</span>
            <span class="fw-bold me-3 text-info" id="navbar-username"></span>
            <span class="badge bg-danger shadow-sm px-3 py-2 d-none" id="navbar-badge-admin">
                <i class="bi bi-shield-lock-fill me-1"></i>ADMINISTRADOR
            </span>
            <a href="#" id="btn-logout" class="ms-3 btn btn-sm btn-outline-danger border-0 fw-bold">
                <i class="bi bi-box-arrow-right fs-5"></i>
            </a>
        </div>
    </div>
</nav>

<!-- Caixa de notificações -->
<div id="caixa-notificacoes" class="position-fixed top-0 end-0 p-3"
     style="z-index:1080; width:min(92vw,380px); pointer-events:none;"></div>

<main class="container">
    <div id="mensagens"></div>

    <div class="d-flex align-items-center gap-3 mb-4">
        <a href="/pages/dashboard/index.html" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h5 class="fw-bold mb-0">
            <i class="bi bi-ticket-detailed me-2 text-primary"></i>
            Chamado <span id="chamado-id" class="text-muted">#</span>: <span id="chamado-titulo"></span>
        </h5>
    </div>

    <div class="row g-4">
        <!-- Coluna principal: informações + conversa -->
        <div class="col-lg-8">
            <div class="card page-card mb-4">
                <div class="card-body">
                    <p class="text-muted rotulo-secao fw-semibold text-uppercase mb-3">Informações</p>
                    <dl class="row mb-0 small">
                        <dt class="col-sm-4 text-muted">Usuário</dt>     <dd class="col-sm-8" id="info-usuario"></dd>
                        <dt class="col-sm-4 text-muted">Categoria</dt>   <dd class="col-sm-8" id="info-categoria"></dd>
                        <dt class="col-sm-4 text-muted">Prioridade</dt>  <dd class="col-sm-8" id="info-prioridade"></dd>
                        <dt class="col-sm-4 text-muted">Aberto em</dt>   <dd class="col-sm-8" id="info-data"></dd>
                    </dl>
                    <hr>
                    <p class="text-muted rotulo-secao fw-semibold text-uppercase mb-2">Descrição</p>
                    <div class="caixa-descricao" id="info-descricao"></div>
                </div>
            </div>

            <!-- Conversa -->
            <div class="card page-card mb-3">
                <div class="card-body">
                    <p class="text-muted rotulo-secao fw-semibold text-uppercase mb-3">Conversa</p>
                    <div id="lista-comentarios">
                        <p class="text-muted text-center py-3">Carregando...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Coluna lateral: atualizar chamado -->
        <div class="col-lg-4">
            <div class="card page-card">
                <div class="card-body">
                    <p class="text-muted rotulo-secao fw-semibold text-uppercase mb-3">Atualizar chamado</p>
                    <form id="form-atualizacao">
                        <div class="mb-3">
                            <label for="id_status" class="form-label fw-semibold small">Status</label>
                            <select id="id_status" class="form-select form-select-sm">
                                <option value="aberto">Aberto</option>
                                <option value="andamento">Em andamento</option>
                                <option value="concluido">Concluído</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="id_prioridade" class="form-label fw-semibold small">Prioridade</label>
                            <select id="id_prioridade" class="form-select form-select-sm">
                                <option value="baixa">Baixa</option>
                                <option value="media">Média</option>
                                <option value="alta">Alta</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="id_resposta" class="form-label fw-semibold small">Resposta (opcional)</label>
                            <textarea id="id_resposta" class="form-control form-control-sm" rows="4"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-sm w-100 fw-bold">
                            <span id="btn-atualiza-texto">Salvar alterações</span>
                            <span id="btn-atualiza-spinner" class="spinner-border spinner-border-sm d-none ms-1" role="status"></span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
    import { requireAuth, preencherNavbar, isStaff,
             STATUS_DISPLAY, PRIORIDADE_DISPLAY, CATEGORIA_DISPLAY,
             formatarData, linebreaksbr, mostrarAlerta } from "../../../assets/js/auth.js";
    import { getChamado, atualizarChamado, adicionarComentario, getComentarios } from "../../../assets/js/api.js";
    import { getUsuario } from "../../../assets/js/auth.js";
    import "../../../assets/js/notificacoes.js";

    requireAuth();
    if (!isStaff()) window.location.href = "/pages/dashboard/index.html";
    preencherNavbar();

    const params = new URLSearchParams(location.search);
    const chamadoId = params.get("id");
    if (!chamadoId) window.location.href = "/pages/dashboard/index.html";

    const msgs = document.getElementById("mensagens");

    async function carregar() {
        try {
        const chamado = await getChamado(chamadoId);
        document.getElementById("chamado-id").textContent = "#" + chamado.id;
        document.getElementById("chamado-titulo").textContent = chamado.titulo;
        document.getElementById("info-usuario").textContent = chamado.usuario_username ?? "";
        document.getElementById("info-categoria").textContent = CATEGORIA_DISPLAY[chamado.categoria] ?? chamado.categoria;
        document.getElementById("info-data").textContent = formatarData(chamado.data_criacao);
        document.getElementById("info-descricao").innerHTML = linebreaksbr(chamado.descricao);

        const elPrio = document.getElementById("info-prioridade");
        const badgePrio = { alta: "bg-danger", media: "bg-warning text-dark", baixa: "bg-secondary" };
        elPrio.innerHTML = `<span class="badge ${badgePrio[chamado.prioridade] ?? "bg-secondary"}">${PRIORIDADE_DISPLAY[chamado.prioridade] ?? chamado.prioridade}</span>`;

        document.getElementById("id_status").value    = chamado.status;
        document.getElementById("id_prioridade").value = chamado.prioridade;

        await carregarComentarios(chamado.usuario);
        } catch (err) {
            msgs.innerHTML = `<div class="alert alert-danger">${err.message || "Erro ao carregar chamado."}</div>`;
        }
    }

    async function carregarComentarios(donoId) {
        const dados = await getComentarios(chamadoId);
        const comentarios = dados.results ?? dados;
        const container = document.getElementById("lista-comentarios");

        if (!comentarios.length) {
            container.innerHTML = `<p class="text-muted text-center small py-2">Nenhuma mensagem ainda.</p>`;
            return;
        }

        container.innerHTML = comentarios.map(c => {
            const isDono = c.usuario === donoId;
            return `
                <div class="d-flex ${isDono ? "" : "flex-row-reverse"} mb-3 gap-2">
                    <div class="chat-bubble p-3 ${isDono ? "chat-cliente" : "chat-admin"}">
                        <p class="fw-semibold small mb-1">${c.usuario_username ?? ""}</p>
                        <p class="mb-1 small">${linebreaksbr(c.texto)}</p>
                        <p class="text-muted" style="font-size:.75rem;margin:0">${formatarData(c.data)}</p>
                    </div>
                </div>`;
        }).join("");
    }

    document.getElementById("form-atualizacao").addEventListener("submit", async (e) => {
        e.preventDefault();
        msgs.innerHTML = "";
        const btnText = document.getElementById("btn-atualiza-texto");
        const spinner = document.getElementById("btn-atualiza-spinner");
        btnText.textContent = "Salvando...";
        spinner.classList.remove("d-none");

        try {
            const resposta = document.getElementById("id_resposta").value.trim();
            await atualizarChamado(chamadoId, {
                status:    document.getElementById("id_status").value,
                prioridade: document.getElementById("id_prioridade").value,
            });
            if (resposta) {
                await adicionarComentario(chamadoId, resposta);
                document.getElementById("id_resposta").value = "";
            }
            mostrarAlerta(msgs, "Chamado atualizado com sucesso.", "success");
            await carregarComentarios();
        } catch {
            mostrarAlerta(msgs, "Erro ao atualizar chamado.", "danger");
        } finally {
            btnText.textContent = "Salvar alterações";
            spinner.classList.add("d-none");
        }
    });

    carregar();
</script>

</body>
</html>
