<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastro — ServiceDesk Facul</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../assets/css/base.css">
    <link rel="stylesheet" href="../../assets/css/auth.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-card auth-card--cadastro card p-4 p-sm-5">

        <div class="text-center mb-4">
            <i class="bi bi-headset fs-1 text-primary"></i>
            <h4 class="fw-bold mt-2 mb-0">ServiceDesk Facul</h4>
            <p class="text-muted small">Crie sua conta</p>
        </div>

        <div id="mensagens"></div>

        <form id="form-cadastro" novalidate>
            <div class="row g-3">
                <div class="col-sm-6">
                    <label for="id_first_name" class="form-label fw-semibold">Nome</label>
                    <input type="text" id="id_first_name" name="first_name" class="form-control js-form-focus">
                </div>
                <div class="col-sm-6">
                    <label for="id_last_name" class="form-label fw-semibold">Sobrenome</label>
                    <input type="text" id="id_last_name" name="last_name" class="form-control">
                </div>
            </div>

            <div class="mt-3">
                <label for="id_username" class="form-label fw-semibold">
                    Usuário <span class="required">*</span>
                </label>
                <input type="text" id="id_username" name="username" class="form-control" required>
            </div>

            <div class="mt-3">
                <label for="id_email" class="form-label fw-semibold">
                    E-mail <span class="required">*</span>
                </label>
                <input type="email" id="id_email" name="email" class="form-control" required>
            </div>

            <div class="mt-3">
                <label for="id_password1" class="form-label fw-semibold">
                    Senha <span class="required">*</span>
                </label>
                <div class="input-group senha-toggle-group">
                    <input type="password" id="id_password1" name="password1" class="form-control" required>
                    <button type="button" class="btn btn-outline-secondary senha-toggle-botao"
                            onclick="alternarVisibilidadeSenha(this)"
                            data-password-target="id_password1"
                            aria-label="Mostrar senha">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <div class="form-text">
                    Mínimo 8 caracteres. Não use senhas muito simples ou apenas numéricas.
                </div>
            </div>

            <div class="mt-3 mb-4">
                <label for="id_password2" class="form-label fw-semibold">
                    Confirmar senha <span class="required">*</span>
                </label>
                <div class="input-group senha-toggle-group">
                    <input type="password" id="id_password2" name="password2" class="form-control" required>
                    <button type="button" class="btn btn-outline-secondary senha-toggle-botao"
                            onclick="alternarVisibilidadeSenha(this)"
                            data-password-target="id_password2"
                            aria-label="Mostrar senha">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">
                <span id="btn-cadastro-texto">Criar conta</span>
                <span id="btn-cadastro-spinner" class="spinner-border spinner-border-sm d-none ms-2" role="status"></span>
            </button>
        </form>

        <p class="text-center text-muted small mt-4 mb-0">
            Já tem conta?
            <a href="/pages/login/index.html" class="fw-semibold">Entrar</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../assets/js/base.js"></script>
<script type="module">
    import { handleCadastro, mostrarAlerta } from "../../assets/js/auth.js";

    const form    = document.getElementById("form-cadastro");
    const msgs    = document.getElementById("mensagens");
    const btnText = document.getElementById("btn-cadastro-texto");
    const spinner = document.getElementById("btn-cadastro-spinner");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();
        msgs.innerHTML = "";

        const password1 = document.getElementById("id_password1").value;
        const password2 = document.getElementById("id_password2").value;

        if (password1 !== password2) {
            mostrarAlerta(msgs, "As senhas não coincidem.", "danger");
            return;
        }

        btnText.textContent = "Criando conta...";
        spinner.classList.remove("d-none");

        try {
            await handleCadastro({
                username:   document.getElementById("id_username").value.trim(),
                email:      document.getElementById("id_email").value.trim(),
                first_name: document.getElementById("id_first_name").value.trim(),
                last_name:  document.getElementById("id_last_name").value.trim(),
                password1,
                password2,
            });
        } catch (err) {
            const erros = err.data || {};
            const msgs_texto = Object.values(erros).flat().join(" ");
            mostrarAlerta(msgs, msgs_texto || "Erro ao criar conta.", "danger");
        } finally {
            btnText.textContent = "Criar conta";
            spinner.classList.add("d-none");
        }
    });
</script>

</body>
</html>
