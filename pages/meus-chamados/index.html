<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meus chamados — ServiceDesk Facul</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../assets/css/base.css">
    <link rel="stylesheet" href="../../assets/css/lista.css">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark mb-4 shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/pages/dashboard/index.html">
            <i class="bi bi-headset me-2 text-primary"></i>ServiceDesk Facul
        </a>
        <div class="text-white d-flex align-items-center">
            <span class="me-2 small text-white-50">Logado como:</span>
            <span class="fw-bold me-3 text-info" id="navbar-username"></span>
            <span class="badge bg-success shadow-sm px-3 py-2 d-none" id="navbar-badge-cliente">
                <i class="bi bi-person-fill me-1"></i>CLIENTE
            </span>
            <a href="#" id="btn-logout" class="ms-3 btn btn-sm btn-outline-danger border-0 fw-bold">
                <i class="bi bi-box-arrow-right fs-5"></i>
            </a>
        </div>
    </div>
</nav>

<!-- Caixa de notificações -->
<div id="caixa-notificacoes" class="position-fixed top-0 end-0 p-3"
     style="z-index:1080; width:min(92vw,380px); pointer-events:none;"></div>

<main class="container">
    <div id="mensagens"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="fw-bold mb-0">
            <i class="bi bi-clock-history me-2 text-primary"></i>Meus chamados
        </h5>
        <a href="/pages/chamado/novo/index.html" class="btn btn-primary btn-sm fw-bold">
            <i class="bi bi-plus-circle me-1"></i>Novo chamado
        </a>
    </div>

    <div class="card page-card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4">#</th>
                            <th>Título</th>
                            <th>Categoria</th>
                            <th>Status</th>
                            <th>Prioridade</th>
                            <th>Aberto em</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="tabela-body">
                        <tr><td colspan="7" class="text-center py-4 text-muted">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
    import { requireAuth, preencherNavbar, isStaff,
             STATUS_DISPLAY, PRIORIDADE_DISPLAY, CATEGORIA_DISPLAY,
             formatarData } from "../../assets/js/auth.js";
    import { getChamados } from "../../assets/js/api.js";
    import "../../assets/js/notificacoes.js";

    requireAuth();
    // Página exclusiva para clientes
    if (isStaff()) window.location.href = "/pages/dashboard/index.html";
    preencherNavbar();

    const BADGE_STATUS = { aberto: "bg-warning text-dark", andamento: "bg-info text-dark", concluido: "bg-success" };
    const BADGE_PRIO   = { alta: "bg-danger", media: "bg-warning text-dark", baixa: "bg-secondary" };

    const tbody = document.getElementById("tabela-body");

    try {
        const data = await getChamados();
        const chamados = data.results ?? data;

        if (!chamados.length) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="7" class="text-center py-5">
                        <p class="text-muted mb-3">Você ainda não abriu nenhum chamado.</p>
                        <a href="/pages/chamado/novo/index.html" class="btn btn-primary btn-sm fw-bold">
                            <i class="bi bi-plus-circle me-1"></i>Abrir primeiro chamado
                        </a>
                    </td>
                </tr>`;
        } else {
            tbody.innerHTML = chamados.map(c => `
                <tr style="cursor:pointer" onclick="window.location='/pages/chamado/detalhe-cliente/index.html?id=${c.id}'">
                    <td class="ps-4 text-muted">#${c.id}</td>
                    <td class="fw-semibold">${c.titulo}</td>
                    <td>${CATEGORIA_DISPLAY[c.categoria] ?? c.categoria}</td>
                    <td><span class="badge ${BADGE_STATUS[c.status] ?? "bg-secondary"}">${STATUS_DISPLAY[c.status] ?? c.status}</span></td>
                    <td><span class="badge ${BADGE_PRIO[c.prioridade] ?? "bg-secondary"}">${PRIORIDADE_DISPLAY[c.prioridade] ?? c.prioridade}</span></td>
                    <td class="text-muted small">${formatarData(c.data_criacao)}</td>
                    <td><i class="bi bi-chevron-right text-muted"></i></td>
                </tr>
            `).join("");
        }
    } catch {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-danger">Erro ao carregar chamados.</td></tr>`;
    }
</script>

</body>
</html>
