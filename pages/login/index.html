<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — ServiceDesk Facul</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../assets/css/base.css">
    <link rel="stylesheet" href="../../assets/css/auth.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-card auth-card--login card p-4 p-sm-5">

        <div class="text-center mb-4">
            <i class="bi bi-headset fs-1 text-primary"></i>
            <h4 class="fw-bold mt-2 mb-0">ServiceDesk Facul</h4>
            <p class="text-muted small">Acesse sua conta para continuar</p>
        </div>

        <!-- Feedback de erros -->
        <div id="mensagens"></div>

        <form id="form-login" novalidate>
            <!-- Campo: usuário -->
            <div class="mb-3">
                <label for="id_username" class="form-label fw-semibold">
                    Usuário ou e-mail <span class="required">*</span>
                </label>
                <input type="text" id="id_username" name="username" class="form-control js-form-focus" required autofocus>
            </div>

            <!-- Campo: senha com toggle -->
            <div class="mb-4">
                <label for="id_password" class="form-label fw-semibold">
                    Senha <span class="required">*</span>
                </label>
                <div class="input-group senha-toggle-group">
                    <input type="password" id="id_password" name="password" class="form-control" required>
                    <button type="button" class="btn btn-outline-secondary senha-toggle-botao"
                            onclick="alternarVisibilidadeSenha(this)"
                            data-password-target="id_password"
                            aria-label="Mostrar senha">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">
                <span id="btn-login-texto">Entrar</span>
                <span id="btn-login-spinner" class="spinner-border spinner-border-sm d-none ms-2" role="status"></span>
            </button>
        </form>

        <!-- Divisor Google OAuth -->
        <div class="google-divider my-4">
            <span class="google-divider__line"></span>
            <span class="google-divider__text">ou continue com</span>
            <span class="google-divider__line"></span>
        </div>

        <a href="http://localhost:8000/accounts/google/login/" class="google-login-btn w-100">
            <span class="google-login-btn__icon">
                <i class="bi bi-google"></i>
            </span>
            <span class="google-login-btn__text">Entrar com Google</span>
        </a>

        <p class="text-center text-muted small mt-4 mb-0">
            Não tem uma conta?
            <a href="/pages/cadastro/index.html" class="fw-semibold">Cadastre-se</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../assets/js/base.js"></script>
<script type="module">
    import { handleLogin } from "../../assets/js/auth.js";
    import { mostrarAlerta } from "../../assets/js/auth.js";
    import { isAuthenticated, isStaff } from "../../assets/js/auth.js";

    // Se já logado, redireciona direto
    if (isAuthenticated()) {
        window.location.href = "/pages/dashboard/index.html";
    }

    const form    = document.getElementById("form-login");
    const msgs    = document.getElementById("mensagens");
    const btnText = document.getElementById("btn-login-texto");
    const spinner = document.getElementById("btn-login-spinner");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();
        msgs.innerHTML = "";
        btnText.textContent = "Entrando...";
        spinner.classList.remove("d-none");

        const username = document.getElementById("id_username").value.trim();
        const password = document.getElementById("id_password").value;

        try {
            await handleLogin(username, password);
        } catch (err) {
            const msg = err.data?.detail || "Usuário ou senha incorretos.";
            mostrarAlerta(msgs, msg, "danger");
        } finally {
            btnText.textContent = "Entrar";
            spinner.classList.add("d-none");
        }
    });
</script>

</body>
</html>
